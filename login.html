<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>SurveyEarn - Login</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #5a4bff, #3a2ca3);
    padding:1.5rem;
}

/* CONTAINER */
.container{
    text-align:center;
    width:100%;
    max-width:480px;
    margin:0 auto;
}

/* LOGO */
.logo{
    color:white;
    margin-bottom:0.75rem;
}
.logo i{
    font-size:2rem;
    margin-right:0.5rem;
}
.logo span{
    font-size:1.5rem;
    font-weight:600;
}

/* TITLE */
h1{
    color:white;
    font-size:1.75rem;
    margin-top:0.5rem;
    font-weight:600;
}
.subtitle{
    color:rgba(255,255,255,0.85);
    margin:0.5rem 0 1.5rem;
    font-size:0.9rem;
}
.subtitle a{
    color:#ff9d5c;
    text-decoration:none;
    font-weight:500;
}

/* CARD */
.card{
    background:white;
    width:100%;
    padding:2rem;
    border-radius:1rem;
    text-align:left;
    box-shadow:0 20px 35px -10px rgba(0,0,0,0.2);
}

/* FORM */
.form-group{
    margin-bottom:1.25rem;
}
label{
    font-size:0.85rem;
    color:#374151;
    display:block;
    margin-bottom:0.5rem;
    font-weight:500;
}

.input-box{
    display:flex;
    align-items:center;
    background:#f9fafb;
    border:1px solid #e5e7eb;
    border-radius:0.75rem;
    padding:0.75rem 1rem;
    transition:all 0.2s;
}
.input-box:focus-within{
    border-color:#5a4bff;
    box-shadow:0 0 0 3px rgba(90,75,255,0.1);
}
.input-box i{
    margin-right:0.75rem;
    color:#9ca3af;
    font-size:1rem;
}
.input-box input{
    border:none;
    outline:none;
    width:100%;
    background:transparent;
    font-size:0.9rem;
    color:#1f2937;
}
.input-box input::placeholder{
    color:#d1d5db;
}
.eye{
    cursor:pointer;
    color:#9ca3af;
    transition:color 0.2s;
}
.eye:hover{
    color:#5a4bff;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:1.5rem;
}
.row label{
    display:flex;
    align-items:center;
    gap:0.5rem;
    font-size:0.85rem;
    color:#4b5563;
    cursor:pointer;
}
.row label input{
    cursor:pointer;
}
.row a{
    font-size:0.85rem;
    color:#5a4bff;
    text-decoration:none;
    font-weight:500;
}
.row a:hover{
    text-decoration:underline;
}

/* BUTTON */
.btn{
    width:100%;
    padding:0.875rem;
    border:none;
    border-radius:0.75rem;
    background:linear-gradient(135deg, #5a4bff, #ff7a18);
    color:white;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:0.5rem;
    transition:transform 0.2s, box-shadow 0.2s;
}
.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px -5px rgba(90,75,255,0.4);
}

.error-message{
    color:#dc2626;
    font-size:0.75rem;
    margin-top:0.5rem;
    text-align:left;
    display:flex;
    align-items:center;
    gap:0.25rem;
}
.error-message i{
    font-size:0.7rem;
}

/* Mobile Responsive */
@media (max-width: 560px) {
    body{
        padding:1rem;
    }
    .card{
        padding:1.5rem;
    }
    h1{
        font-size:1.5rem;
    }
    .logo i{
        font-size:1.75rem;
    }
    .logo span{
        font-size:1.25rem;
    }
    .btn{
        padding:0.75rem;
    }
}

/* For very small screens */
@media (max-width: 380px) {
    .row{
        flex-direction: column;
        gap:0.75rem;
        align-items:flex-start;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <i class="fa-solid fa-clipboard-list"></i>
        <span>SurveyEarn</span>
    </div>

    <h1>Sign in to your account</h1>
    <div class="subtitle">
        Don't have an account? <a href="signup.html">Sign up</a>
    </div>

    <div class="card">

        <div class="form-group">
            <label>Email address</label>
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div id="emailError" class="error-message"></div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                <i class="fa-regular fa-eye eye" id="togglePassword"></i>
            </div>
            <div id="passwordError" class="error-message"></div>
        </div>

        <div class="row">
            <label><input type="checkbox" id="rememberMe"> Remember me</label>
            <a href="#">Forgot your password?</a>
        </div>

        <button class="btn" id="loginBtn">
            Sign in <i class="fa-solid fa-arrow-right"></i>
        </button>

    </div>

</div>

<script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const pwd = document.getElementById('loginPassword');
        if (pwd.type === 'password') { 
            pwd.type = 'text'; 
            this.classList.remove('fa-eye'); 
            this.classList.add('fa-eye-slash'); 
        } else { 
            pwd.type = 'password'; 
            this.classList.remove('fa-eye-slash'); 
            this.classList.add('fa-eye'); 
        }
    });

    document.getElementById('loginBtn').addEventListener('click', function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        let error = false;
        
        // Clear previous errors
        document.getElementById('emailError').innerHTML = '';
        document.getElementById('passwordError').innerHTML = '';

        // Email validation
        if (!email) { 
            document.getElementById('emailError').innerHTML = '<i class="fas fa-exclamation-circle"></i> Email is required'; 
            error = true; 
        } else if (!email.includes('@') || !email.includes('.')) { 
            document.getElementById('emailError').innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter a valid email address'; 
            error = true; 
        }
        
        // Password validation
        if (!password) { 
            document.getElementById('passwordError').innerHTML = '<i class="fas fa-exclamation-circle"></i> Password is required'; 
            error = true; 
        }
        
        if (error) return;

        // Get users from localStorage
        let users = JSON.parse(localStorage.getItem('users')) || [];
        
        // Check if user exists with this email
        const existingUser = users.find(u => u.email === email);
        
        if (!existingUser) {
            // Account not found
            document.getElementById('emailError').innerHTML = '<i class="fas fa-exclamation-circle"></i> No account found with this email address';
            return;
        }
        
        // Check password
        if (existingUser.password !== password) {
            document.getElementById('passwordError').innerHTML = '<i class="fas fa-exclamation-circle"></i> Incorrect password. Please try again.';
            return;
        }

        // Store session
        sessionStorage.setItem('loggedInUser', JSON.stringify({ email: existingUser.email, name: existingUser.name }));
        
        if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('rememberedUser', JSON.stringify({ email: existingUser.email, name: existingUser.name }));
        }
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
    });
    
    // Enter key support
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });
    document.getElementById('loginEmail').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });
    
    // Auto-fill remembered user (optional)
    const remembered = localStorage.getItem('rememberedUser');
    if (remembered) {
        const user = JSON.parse(remembered);
        document.getElementById('loginEmail').value = user.email;
        document.getElementById('rememberMe').checked = true;
    }
</script>

</body>
</html>
